<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새벽, 숲 — 손끝으로 깨우는 아침</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #060b12; }
  #gl { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

  /* ── 타이틀 오버레이 ─────────────────────────── */
  .overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; pointer-events: none;
    color: #ddd6c8; text-align: center; z-index: 10;
    transform: translateY(-6vh);
  }
  h1 {
    font-family: 'Noto Serif KR', Georgia, serif; font-weight: 200;
    font-size: clamp(1.7rem, 4.2vw, 3.2rem);
    letter-spacing: 0.55em; text-indent: 0.55em;
    opacity: 0.5;
  }
  .sub {
    margin-top: 1.4rem; font-family: 'Noto Serif KR', Georgia, serif;
    font-size: clamp(0.68rem, 1.2vw, 0.85rem); letter-spacing: 0.5em; text-indent: 0.5em;
    opacity: 0.3; font-weight: 200;
  }

  /* ── 상태 칩 & 힌트 ─────────────────────────── */
  .chip {
    position: fixed; top: 1.4rem; left: 50%; transform: translateX(-50%);
    padding: 0.4rem 1.2rem; border-radius: 999px; z-index: 20;
    background: rgba(8, 14, 20, 0.4); backdrop-filter: blur(10px);
    border: 1px solid rgba(221, 214, 200, 0.08);
    color: rgba(221, 214, 200, 0.6);
    font-family: 'Noto Serif KR', serif; font-size: 0.74rem; letter-spacing: 0.12em;
    transition: opacity 0.8s;
  }
  .hint {
    position: fixed; bottom: 1.6rem; left: 50%; transform: translateX(-50%);
    color: rgba(221, 214, 200, 0.35); z-index: 20;
    font-family: 'Noto Serif KR', serif; font-size: 0.72rem; letter-spacing: 0.14em;
    text-align: center; line-height: 2;
    transition: opacity 1.2s;
  }

  /* ── 웹캠 미리보기 ─────────────────────────── */
  #cam {
    position: fixed; right: 1.2rem; bottom: 1.2rem; width: 110px; z-index: 20;
    border-radius: 8px; transform: scaleX(-1);
    opacity: 0.35; border: 1px solid rgba(221,214,200,0.1);
    transition: opacity 0.3s;
  }
  #cam:hover { opacity: 0.85; }
  #cam.hidden { display: none; }
</style>
</head>
<body>
<canvas id="gl"></canvas>

<div class="overlay">
  <h1 id="title">새벽, 숲</h1>
  <div class="sub" id="subtitle">손을 펼치면 아침이 옵니다</div>
</div>

<div class="chip" id="chip">카메라를 준비하는 중…</div>
<div class="hint" id="hint">
  주먹을 쥐면 안개 짙은 밤 · 손을 펼치면 빛이 스며듭니다<br>
  손을 움직이면 그 자리의 안개가 갈라집니다
</div>
<video id="cam" autoplay playsinline muted></video>

<script type="module">
/* ============================================================
   1. WebGL — 안개 낀 새벽 능선, 실시간 렌더링
   ============================================================ */
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl', { antialias: false });

const VERT = `
attribute vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
`;

const FRAG = `
precision highp float;
uniform vec2  uRes;
uniform float uTime;
uniform float uOpen;    // 손 펼침 0(주먹)~1(활짝)
uniform vec2  uHand;    // 손 위치 (0~1, 좌하단 원점)
uniform float uHandOn;  // 손 감지 여부 0~1

float hash21(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123); }

float noise(vec2 p) {
  vec2 i = floor(p), f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(
    mix(hash21(i), hash21(i + vec2(1, 0)), f.x),
    mix(hash21(i + vec2(0, 1)), hash21(i + vec2(1, 1)), f.x),
    f.y
  );
}

float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 5; i++) {
    v += a * noise(p);
    p = p * 2.02 + vec2(31.7, 11.3);
    a *= 0.52;
  }
  return v;
}

/* 부드러운 능선 + 미세한 숲 질감 (삼각형 없이) */
float ridgeline(float x, float seed, float canopy) {
  float h = fbm(vec2(x * 0.65 + seed * 7.3, seed * 3.1)) * 0.72;
  h += fbm(vec2(x * 2.3 + seed * 11.0, seed * 1.9)) * 0.28;
  h += fbm(vec2(x * 8.0 + seed * 13.0, seed * 5.7)) * 0.05 * canopy;
  return h;
}

void main() {
  vec2 uv = gl_FragCoord.xy / uRes;
  float aspect = uRes.x / uRes.y;
  vec2 p  = vec2(uv.x * aspect, uv.y);
  vec2 hp = vec2(uHand.x * aspect, uHand.y);
  float open = uOpen;

  /* ---------- 손 주변 안개 갈라짐 ---------- */
  float hd   = distance(p, hp);
  float part = uHandOn * smoothstep(0.40, 0.05, hd);
  vec2 pushDir = (hd > 0.001) ? (p - hp) / hd : vec2(0.0, 1.0);
  vec2 fogPush = pushDir * part * 0.22;

  /* ---------- 하늘 ---------- */
  float horizon = 0.34;
  vec3 nightTop = vec3(0.016, 0.030, 0.052);
  vec3 nightLow = vec3(0.045, 0.072, 0.102);
  vec3 duskTop  = vec3(0.115, 0.160, 0.215);
  vec3 duskLow  = vec3(0.560, 0.350, 0.230);
  vec3 sky = mix(
    mix(nightLow, nightTop, smoothstep(horizon - 0.1, 1.0, uv.y)),
    mix(duskLow,  duskTop,  smoothstep(horizon - 0.05, 1.0, uv.y)),
    open
  );

  /* 태양 — 부챗살 없이, 겹겹의 부드러운 글로우만 */
  vec2 sun = vec2(0.5 * aspect, horizon + 0.015 + 0.045 * open);
  float sd = distance(p, sun);
  float sunGlow = exp(-sd * 1.5);
  sky += vec3(1.00, 0.78, 0.50) * open * 0.90 * exp(-sd * sd * 18.0);
  sky += vec3(1.00, 0.62, 0.36) * open * 0.45 * exp(-sd * 2.6);
  sky += vec3(0.78, 0.46, 0.28) * open * 0.22 * exp(-sd * 1.0);

  /* 밤에도 지평선에 아주 희미한 온기 */
  sky += vec3(0.10, 0.08, 0.075) * exp(-abs(uv.y - horizon) * 7.0) * (0.22 + 0.78 * open);

  /* 별 — 밤에만, 아주 조용히 */
  vec2 sc = floor(p * 260.0);
  float star = step(0.9988, hash21(sc));
  star *= smoothstep(0.5, 0.9, uv.y) * (1.0 - open) * (1.0 - open);
  star *= 0.4 + 0.6 * sin(uTime * 1.4 + hash21(sc + 7.0) * 40.0);
  sky += vec3(0.75, 0.85, 1.0) * star * 0.30;

  vec3 col = sky;

  /* 안개가 머금는 색 — 밤엔 청회색, 여명엔 태양빛 */
  vec3 hazeCol = mix(
    vec3(0.105, 0.150, 0.198),
    mix(vec3(0.42, 0.36, 0.33), vec3(1.00, 0.72, 0.46), sunGlow),
    open
  );

  /* ---------- 능선 5겹 (뒤 → 앞) — 깊이는 안개가 만든다 ---------- */
  for (int i = 0; i < 5; i++) {
    float fi = float(i);
    float t = fi / 4.0;                              /* 0 = 가장 멀리 */
    float base = mix(0.33, 0.015, t);
    float amp  = mix(0.18, 0.23, t);
    float freq = mix(0.55, 1.45, t);
    float h = base + amp * ridgeline(p.x * freq + fi * 23.0, fi * 4.7 + 2.0, t);
    /* 태양 아래로 열리는 골짜기 — 여명이 계곡 사이로 쏟아진다 */
    float dx = p.x - 0.5 * aspect;
    h -= exp(-dx * dx * 3.2) * mix(0.10, 0.015, t);
    float m = smoothstep(h + 0.002, h - 0.002, uv.y);

    vec3 lc = mix(vec3(0.088, 0.128, 0.165), vec3(0.007, 0.013, 0.022), t);
    /* 여명이 스치는 먼 능선의 온기 */
    lc += vec3(0.55, 0.30, 0.16) * open * exp(-sd * 2.4) * (1.0 - t) * 0.30;
    /* 대기 원근 — 멀수록 하늘/안개에 잠긴다 */
    float haze = pow(1.0 - t, 1.8) * mix(0.88, 0.62, open);
    lc = mix(lc, hazeCol, haze);
    col = mix(col, lc, m);

    /* 능선 위로 피어오르는 골안개 */
    float band = exp(-max(0.0, uv.y - h) * mix(14.0, 26.0, t));
    vec2 bp = p + fogPush;
    float bn = fbm(vec2(bp.x * 2.1 + uTime * 0.020 * (0.5 + t),
                        bp.y * 3.2 - uTime * 0.024));
    float bm = band * smoothstep(0.36, 0.72, bn)
             * mix(0.34, 0.14, t) * mix(1.0, 0.42, open);
    bm *= 1.0 - 0.90 * part;
    col = mix(col, hazeCol, clamp(bm, 0.0, 1.0));
  }

  /* ---------- 도메인 워핑 안개 — 비단결처럼 흐르는 결 ---------- */
  vec2 fp = p + fogPush;
  vec2 q = vec2(
    fbm(fp * 1.35 + vec2(0.0, uTime * 0.013)),
    fbm(fp * 1.35 + vec2(5.2, uTime * 0.017))
  );
  float mist = fbm(fp * vec2(1.5, 2.7) + q * 1.35
                   + vec2(uTime * 0.022, -uTime * 0.030));
  mist *= smoothstep(0.92, 0.06, uv.y);
  float density = mix(0.92, 0.40, open);
  mist = smoothstep(0.34, 0.92, mist * density + 0.10);
  mist *= 1.0 - 0.93 * part;
  col = mix(col, hazeCol, mist * 0.52);

  /* 안개 속으로 번지는 여명의 산란광 */
  col += vec3(1.0, 0.64, 0.36) * open * exp(-sd * 1.9) * (mist * 0.55 + 0.10);

  /* ---------- 아주 작은 부유 입자 — 티끌처럼 ---------- */
  for (int i = 0; i < 6; i++) {
    float fi = float(i);
    float r1 = hash21(vec2(fi, 1.7));
    float r2 = hash21(vec2(fi, 9.2));
    vec2 mp = vec2(
      fract(r1 + uTime * (0.004 + r2 * 0.007)) * aspect,
      0.10 + 0.45 * fract(r2 + uTime * (0.006 + r1 * 0.009))
    );
    float md = distance(p, mp);
    float tw = 0.5 + 0.5 * sin(uTime * (0.8 + r1 * 2.0) + fi * 7.0);
    col += vec3(1.0, 0.82, 0.55) * exp(-md * md * 9000.0) * tw * open * 0.22;
  }

  /* ---------- 톤 정리 ---------- */
  float vig = smoothstep(1.45, 0.42, distance(uv, vec2(0.5, 0.46)));
  col *= mix(0.80, 1.0, vig);
  col *= mix(1.0, 1.12, open);                            /* 아침의 노출 상승 */
  col = mix(col, col * col * (3.0 - 2.0 * col), 0.30);   /* 부드러운 대비 */
  col = pow(max(col, 0.0), vec3(0.94));
  col += (hash21(uv * uRes + fract(uTime) * 7.0) - 0.5) * 0.014;  /* 필름 그레인 */

  gl_FragColor = vec4(col, 1.0);
}
`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    throw new Error(gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FRAG));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'aPos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const U = {};
for (const n of ['uRes', 'uTime', 'uOpen', 'uHand', 'uHandOn'])
  U[n] = gl.getUniformLocation(prog, n);

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 1.75);
  canvas.width  = Math.floor(innerWidth  * dpr);
  canvas.height = Math.floor(innerHeight * dpr);
  gl.viewport(0, 0, canvas.width, canvas.height);
}
addEventListener('resize', resize);
resize();

/* ============================================================
   2. 인터랙션 상태 — 목표값을 두고 매 프레임 부드럽게 보간
   ============================================================ */
const state = {
  open: 0,  openTarget: 0,       // (a) 손 펼침 → 안개·빛
  hx: 0.5,  hy: 0.45,            // (b) 손 위치 → 안개 갈라짐
  hxT: 0.5, hyT: 0.45,
  handOn: 0, handOnTarget: 0,
  usingHand: false,
};

/* ── 마우스/터치 폴백 ── */
let mouseDown = false;
addEventListener('pointermove', e => {
  if (state.usingHand) return;
  state.hxT = e.clientX / innerWidth;
  state.hyT = 1 - e.clientY / innerHeight;
  state.handOnTarget = 1;
});
addEventListener('pointerdown', () => { mouseDown = true; });
addEventListener('pointerup',   () => { mouseDown = false; });

/* ============================================================
   3. MediaPipe 손 인식
   ============================================================ */
const chip = document.getElementById('chip');
const hint = document.getElementById('hint');
const video = document.getElementById('cam');
let landmarker = null;
let lastSeen = 0;

async function initHands() {
  try {
    const { FilesetResolver, HandLandmarker } = await import(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14'
    );
    const files = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );
    landmarker = await HandLandmarker.createFromOptions(files, {
      baseOptions: {
        modelAssetPath:
          'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
        delegate: 'GPU',
      },
      runningMode: 'VIDEO',
      numHands: 1,
    });

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' },
    });
    video.srcObject = stream;
    await video.play();
    chip.textContent = '카메라 앞에 손을 보여주세요';
    detectLoop();
  } catch (err) {
    console.warn('hand tracking unavailable:', err);
    video.classList.add('hidden');
    chip.textContent = '마우스를 움직이고, 누르고 있으면 아침이 옵니다';
  }
}

const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

function detectLoop() {
  const tick = () => {
    if (video.readyState >= 2) {
      const res = landmarker.detectForVideo(video, performance.now());
      if (res.landmarks && res.landmarks.length > 0) {
        const lm = res.landmarks[0];
        lastSeen = performance.now();
        state.usingHand = true;
        state.handOnTarget = 1;

        /* (a) 손 펼침 정도 */
        const size = dist(lm[0], lm[9]) + 1e-6;
        const tips = [8, 12, 16, 20];
        let ext = 0;
        for (const t of tips) ext += dist(lm[t], lm[0]) / size;
        ext /= tips.length;
        state.openTarget = Math.min(1, Math.max(0, (ext - 1.2) / 0.75));

        /* (b) 손바닥 중심 위치 */
        const c = [0, 5, 9, 13, 17].reduce(
          (acc, i) => ({ x: acc.x + lm[i].x / 5, y: acc.y + lm[i].y / 5 }),
          { x: 0, y: 0 }
        );
        state.hxT = 1 - c.x;
        state.hyT = 1 - c.y;

        chip.style.opacity = '0';
        hint.style.opacity = '0';
      } else if (performance.now() - lastSeen > 800) {
        state.usingHand = false;
        state.handOnTarget = 0;
        chip.style.opacity = '1';
        hint.style.opacity = '1';
        chip.textContent = '카메라 앞에 손을 보여주세요';
      }
    }
    requestAnimationFrame(tick);
  };
  tick();
}
initHands();

/* ============================================================
   4. 렌더 루프
   ============================================================ */
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const lerp = (a, b, t) => a + (b - a) * t;
const t0 = performance.now();

function frame() {
  if (!state.usingHand)
    state.openTarget = mouseDown ? 1 : 0;

  state.open   = lerp(state.open,   state.openTarget,   state.usingHand ? 0.08 : 0.03);
  state.hx     = lerp(state.hx,     state.hxT,     0.14);
  state.hy     = lerp(state.hy,     state.hyT,     0.14);
  state.handOn = lerp(state.handOn, state.handOnTarget, 0.07);

  gl.uniform2f(U.uRes, canvas.width, canvas.height);
  gl.uniform1f(U.uTime, (performance.now() - t0) / 1000);
  gl.uniform1f(U.uOpen, state.open);
  gl.uniform2f(U.uHand, state.hx, state.hy);
  gl.uniform1f(U.uHandOn, state.handOn);
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  /* 타이틀도 여명과 함께 깨어난다 — 절제된 변화만 */
  const o = state.open;
  title.style.opacity = 0.42 + o * 0.5;
  title.style.textShadow = `0 0 ${30 + o * 40}px rgba(255,190,130,${o * 0.35})`;
  subtitle.style.opacity = 0.3 * (1 - o * 0.8);

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
